startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      mercadolibreAccessToken:
        type: string
        title: MercadoLibre Access Token
        description: Optional access token for authenticated endpoints. Public endpoints (search, items, categories, trends) work without auth.
  commandFunction:
    |-
    (config) => ({
      command: "npx",
      args: ["-y", "@dan1d/mercadolibre-mcp"],
      env: {
        ...(config.mercadolibreAccessToken ? { MERCADOLIBRE_ACCESS_TOKEN: config.mercadolibreAccessToken } : {})
      }
    })
